<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Ян Корионов — Персональный сайт</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e6e6e6;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .profile-photo {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #4CAF50;
      box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
      margin-bottom: 1.5rem;
      transition: transform 0.3s ease;
    }

    .profile-photo:hover {
      transform: scale(1.05);
    }

    h1 {
      color: #ffffff;
      margin-bottom: 1rem;
      font-size: 2.2rem;
      font-weight: 600;
    }

    p {
      color: #b0b0b0;
      line-height: 1.6;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }

    .highlight {
      color: #4CAF50;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="profile-card">
    <img src="https://sun4-19.userapi.com/s/v1/ig2/kufcjBA5_bSYSKpqxA-1fSIo3rJqh4ZMVf2F-i9zzN6CJ_v1Kmy4u98JZA_qESOaICz7Qynu9swIw5Zilex8BSw_.jpg?quality=95&crop=265,480,1348,1348&as=32x32,48x48,72x72,108x108,160x160,240x240,360x360,480x480,540x540,640x640,720x720,1080x1080,1280x1280&cs=400x400"
         alt="Фото Яна Корионова"
         class="profile-photo">
    <h1>Добро пожаловать на мой сайт!</h1>
    <p>Меня зовут <span class="highlight">Ян Корионов</span>. Здесь вы найдёте информацию о моих проектах и достижениях.</p>
  </div>
</body>
</html>
